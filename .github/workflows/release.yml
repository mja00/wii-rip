name: release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

env:
  PACKAGE_NAME: wii-rip-linux-x86_64
  DOLPHIN_REF: 2603a

jobs:
  ubuntu-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            gettext \
            ninja-build \
            pkg-config \
            wit

      - name: Build dolphin-tool helper
        run: |
          ./packaging/build_dolphin_tool.sh \
            --ref "$DOLPHIN_REF" \
            --output "$RUNNER_TEMP/dolphin-tool"

      - name: Run linters
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Package bundled release
        run: |
          ./packaging/build_release.sh \
            --name "$PACKAGE_NAME" \
            --tar \
            --dolphin-tool "$RUNNER_TEMP/dolphin-tool" \
            --wit "$(command -v wit)"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: dist/${{ env.PACKAGE_NAME }}.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.PACKAGE_NAME }}.tar.gz
